<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Youth Interest 2027</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen">
    
        <header class="fixed top-0 left-0 w-full text-gray-600 body-font shadow-md bg-white z-50">
  <div class="container mx-auto flex flex-wrap p-5 items-center justify-between">

    <!-- LOGO -->
    <a class="flex items-center text-gray-900">
      <img src="images/1.jpeg" alt="" class="h-12 w-auto">
    </a>

    <!-- HAMBURGER (mobile only) -->
    <button id="menu-btn" class="md:hidden text-gray-700 focus:outline-none">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <!-- NAV + BUTTON -->
    <div id="menu" class="hidden w-full md:flex md:items-center md:w-auto">

      <!-- NAV -->
      <nav class="flex flex-col md:flex-row md:ml-auto md:space-x-2 mt-4 md:mt-0">
        <a class="px-4 py-2 text-lg font-bold rounded-lg hover:bg-gray-500 hover:text-white" href="index.html">Home</a>
        <a class="px-4 py-2 text-lg font-bold rounded-lg hover:bg-gray-500 hover:text-white" href="about.html">About</a>
        <a class="px-4 py-2 text-lg font-bold rounded-lg hover:bg-gray-500 hover:text-white" href="empowerments.html">Empowerments</a>
        <a class="px-4 py-2 text-lg font-bold rounded-lg hover:bg-gray-500 hover:text-white" href="vision.html">The Vision</a>
      </nav>

      <!-- BUTTON -->
      <div class="mt-4 md:mt-0 md:ml-4">
        <a href="join.html" class="inline-flex items-center bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-500 hover:text-white transition">
          Join Us
        </a>
      </div>

    </div>

  </div>
        </header>

        <main class="flex-grow pt-[8rem] sm:pt-[10rem] md:pt-[6rem] lg:pt-[8rem]">
         <section class="relative py-12 px-4">
  <!-- Background image -->
  <div class="absolute inset-0 bg-cover bg-center opacity-20" style="background-image: url('images/1.jpeg');"></div>

  <!-- Form container -->
  <div class="relative max-w-3xl mx-auto bg-white shadow-xl rounded-2xl p-8">
    
    <!-- Title -->
    <div class="heading flex flex-col items-center">
      <img src="images/1.jpeg" alt="Youth Interest Logo" class="h-24 w-auto mb-4">
      <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-6 text-center">
        Youth Interest 2027 Registration Form
      </h2>
    </div>

    <form class="space-y-6">
      <!-- Name -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-700 mb-1">First Name</label>
          <input type="text" placeholder="Enter first name" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-700 mb-1">Last Name</label>
          <input type="text" placeholder="Enter last name" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <!-- Address -->
      <div>
        <label class="block text-gray-700 mb-1">Address</label>
        <input type="text" placeholder="Enter your address" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Location -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-gray-700 mb-1">Village</label>
          <input type="text" placeholder="Village" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-700 mb-1">Ward</label>
          <select class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option>Select Ward</option>
            <option>Central 1</option>
            <option>Central 2</option>
            <option>Central 3</option>
            <option>North 1</option>
            <option>North 2</option>
            <option>South 1</option>
            <option>South 2</option>
            <option>South 3</option>
            <option>South 4</option>
            <option>South 5</option>
          </select>
        </div>
        <div>
          <label class="block text-gray-700 mb-1">LGA</label>
          <input 
              type="text" 
              value="Uruan" 
              readonly
              class="w-full border border-gray-300 bg-gray-100 cursor-not-allowed rounded-lg px-4 py-2 focus:outline-none">
        </div>
      </div>

      <!-- Contact -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-700 mb-1">Phone Number</label>
          <input type="tel" placeholder="Enter phone number" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-700 mb-1">Email</label>
          <input type="email" placeholder="Enter email address" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <!-- DOB -->
      <div>
        <label class="block text-gray-700 mb-1">Date of Birth</label>
        <input type="date" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Interests -->
      <div>
        <label class="block text-gray-700 mb-2">Interested In:</label>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
          <label class="flex items-center space-x-2">
            <input type="radio" name="interest" value="Business" class="text-blue-500">
            <span>Business</span>
          </label>
          <label class="flex items-center space-x-2">
            <input type="radio" name="interest" value="ICT" class="text-blue-500">
            <span>ICT</span>
          </label>
          <label class="flex items-center space-x-2">
            <input type="radio" name="interest" value="Education Support" class="text-blue-500">
            <span>Education Support</span>
          </label>
          <label class="flex items-center space-x-2">
            <input type="radio" name="interest" value="Support for Elderly" class="text-blue-500">
            <span>Support for Elderly</span>
          </label>
        </div>
      </div>

      <!-- Submit -->
      <div class="text-center">
        <button type="submit" class="bg-blue-500 text-white px-8 py-3 rounded-lg text-lg hover:bg-blue-600 transition">
          Register
        </button>
      </div>

    </form>
  </div>
</section>

        </main>
<!-- footer -->

    <footer class="text-gray-600 body-font bg-gray-100 border-t">
  <div class="container px-5 py-8 mx-auto flex items-center sm:flex-row flex-col">
    <a class="flex title-font font-medium items-center md:justify-start justify-center text-gray-900">

      <img src="images/1.jpeg" alt="logo" class="h-10 w-auto ml-3">
    </a>
    <p class="text-sm text-gray-500 sm:ml-4 sm:pl-4 sm:border-l-2 sm:border-gray-200 sm:py-2 sm:mt-0 mt-4">© 2026 SHEILDOEB —
      <a href="https://twitter.com/knyttneve" class="text-gray-600 ml-1" rel="noopener noreferrer" target="_blank">@otuekong_bassey</a>
    </p>
    <span class="inline-flex sm:ml-auto sm:mt-0 mt-4 justify-center sm:justify-start">
      <a class="text-gray-500">
        <svg fill="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-5 h-5" viewBox="0 0 24 24">
          <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"></path>
        </svg>
      </a>
      <a class="ml-3 text-gray-500">
        <svg fill="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-5 h-5" viewBox="0 0 24 24">
          <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"></path>
        </svg>
      </a>
      <a class="ml-3 text-gray-500">
        <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-5 h-5" viewBox="0 0 24 24">
          <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37zm1.5-4.87h.01"></path>
        </svg>
      </a>
      <a class="ml-3 text-gray-500">
        <svg fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="0" class="w-5 h-5" viewBox="0 0 24 24">
          <path stroke="none" d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"></path>
          <circle cx="4" cy="4" r="2" stroke="none"></circle>
        </svg>
      </a>
    </span>
  </div>
    </footer>
<script>
  // Select all nav links
  const navLinks = document.querySelectorAll('header nav a');

  // Get current page filename
  let currentPage = window.location.pathname.split('/').pop();
  if (!currentPage) currentPage = 'index.html'; // default for homepage

  navLinks.forEach(link => {
    let href = link.getAttribute('href');

    // Map your special cases: e.g., The Vision page
    if (href === '#') href = 'join.html'; // update this to match your actual page

    // Compare
    if (href === currentPage) {
      link.classList.add('bg-gray-500', 'text-white'); // highlight active tab
    } else {
      link.classList.remove('bg-gray-500', 'text-white'); // remove highlight if needed
    }
  });
</script>

<script>
  const menuBtn = document.getElementById('menu-btn');
  const menu = document.getElementById('menu');
  const navLinkss = document.querySelectorAll('#menu a');

  // Toggle menu when hamburger is clicked
  menuBtn.addEventListener('click', () => {
    menu.classList.toggle('hidden');
  });

  // Hide menu when a link is clicked (mobile UX)
  navLinkss.forEach(link => {
    link.addEventListener('click', () => {
      menu.classList.add('hidden');
    });
  });
</script>

<script src="https://kit.fontawesome.com/c27acce84b.js" ></script>
</body>
</html>
